<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      transition: background 0.3s ease;
    }

    body.masuk {
      background: #198754;
      color: white;
    }

    body.pulang {
      background: #dc3545;
      color: white;
    }

    #loginBox, #absenBox {
      max-width: 500px;
      margin: 0 auto;
    }

    select, input, button, textarea {
      width: 90%;
      max-width: 400px;
      padding: 15px;
      font-size: 18px;
      margin: 10px 0;
      border-radius: 10px;
      box-sizing: border-box;
    }

    input, select, textarea {
      border: 1px solid #ccc;
      color: black;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    video, img {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 10px;
      background: #000;
    }

    #statusText {
      font-size: 32px;
      margin-bottom: 5px;
    }

    #jamText {
      font-size: 24px;
      margin-top: 0;
    }

    .info {
      font-size: 16px;
      margin-top: 8px;
      opacity: 0.95;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #jamMasukUser,
    #jamPulangUser {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #networkInfo {
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>ABSENSI</h2>
  <div id="networkInfo"></div>

  <div id="loginBox">
    <select id="loginNama">
      <option value="">-- Pilih Nama --</option>
    </select>
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="login()">LOGIN</button>
    <div class="info" id="loginInfo"></div>
  </div>

  <div id="absenBox" style="display:none;">
    <h3 id="namaUser"></h3>
    <div id="jamMasukUser">Jam masuk: 00.00</div>
    <div id="jamPulangUser">Jam pulang: 00.00</div>

    <select id="jenisAbsen">
      <option value="WFO" selected>WFO</option>
      <option value="DL">DL</option>
      <option value="IJIN">IJIN</option>
      <option value="SAKIT">SAKIT</option>
      <option value="WFA">WFA</option>
    </select>

    <div id="formPulang" style="display:none;">
      <textarea id="uraianTugas" placeholder="Uraian tugas"></textarea>
      <textarea id="outputKerja" placeholder="Output"></textarea>
      <textarea id="alamatKerja" placeholder="Alamat"></textarea>
    </div>

    <h2 id="statusText"></h2>
    <h3 id="jamText"></h3>

    <video id="video" autoplay playsinline></video>
    <img id="preview" style="display:none;" alt="Preview Foto">

    <br>
    <button onclick="ambilFoto()">📸 Ambil Foto</button>
    <button onclick="kirimAbsen()">✅ Kirim</button>
    <button onclick="ulangFoto()">🔄 Ulang</button>
    <button onclick="logout()">Logout</button>

    <div class="info" id="submitInfo"></div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxl0fJC2790vwN9DYnr6xCXW_BBuMAIP0M7btnF4SIpwzAw4dV1hTMDP1f6k652sp4/exec";
    const SESSION_MS = 10 * 60 * 1000;

    let pegawai = [];
    let config = {};
    let jamAbsensiHariIni = {};
    let userLogin = null;
    let fotoBase64 = null;
    let realtimeStarted = false;

    const loginNama = document.getElementById("loginNama");
    const pin = document.getElementById("pin");
    const loginBox = document.getElementById("loginBox");
    const absenBox = document.getElementById("absenBox");
    const namaUser = document.getElementById("namaUser");
    const jamMasukUser = document.getElementById("jamMasukUser");
    const jamPulangUser = document.getElementById("jamPulangUser");
    const jenisAbsen = document.getElementById("jenisAbsen");
    const formPulang = document.getElementById("formPulang");
    const uraianTugas = document.getElementById("uraianTugas");
    const outputKerja = document.getElementById("outputKerja");
    const alamatKerja = document.getElementById("alamatKerja");
    const statusText = document.getElementById("statusText");
    const jamText = document.getElementById("jamText");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");
    const loginInfo = document.getElementById("loginInfo");
    const submitInfo = document.getElementById("submitInfo");
    const networkInfo = document.getElementById("networkInfo");

    function updateNetworkInfo() {
      networkInfo.innerText = navigator.onLine ? "Online" : "Offline";
    }

    window.addEventListener("online", updateNetworkInfo);
    window.addEventListener("offline", updateNetworkInfo);

    async function initApp() {
      try {
        updateNetworkInfo();
        loginInfo.innerText = "Memuat data pegawai...";

        const res = await fetch(API, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("Gagal menghubungi server. HTTP " + res.status);
        }

        const text = await res.text();
        console.log("GET RESPONSE RAW:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response API bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        pegawai = data.pegawai || [];
        config = data.setting || {};
        jamAbsensiHariIni = data.jamAbsensiHariIni || {};

        console.log("DEBUG GET:", data.debug || {});
        console.log("JAM ABSENSI HARI INI:", jamAbsensiHariIni);

        loginNama.innerHTML = '<option value="">-- Pilih Nama --</option>';

        pegawai.forEach(p => {
          const o = document.createElement("option");
          o.value = p.nama;
          o.textContent = p.nama;
          o.dataset.nip = p.nip;
          o.dataset.pin = p.pin;
          loginNama.appendChild(o);
        });

        loginInfo.innerText = "";
        loadUser();
        startCamera();

      } catch (err) {
        console.error(err);
        loginInfo.innerText = "Gagal memuat data: " + err.message;
        alert("Gagal memuat data:\n" + err.message);
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        alert("Kamera tidak bisa diakses: " + err.message);
      }
    }

    function saveSession(user) {
      const payload = {
        user: user,
        expiredAt: Date.now() + SESSION_MS
      };
      localStorage.setItem("session_absen", JSON.stringify(payload));
    }

    function getSession() {
      const raw = localStorage.getItem("session_absen");
      if (!raw) return null;

      try {
        const session = JSON.parse(raw);
        if (!session.expiredAt || Date.now() > session.expiredAt) {
          localStorage.removeItem("session_absen");
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem("session_absen");
        return null;
      }
    }

    function refreshSession() {
      if (!userLogin) return;
      saveSession(userLogin);
    }

    function login() {
      const selected = loginNama.selectedOptions[0];

      if (!selected || !selected.value) {
        alert("Pilih nama terlebih dahulu");
        return;
      }

      if (pin.value !== selected.dataset.pin) {
        alert("PIN salah");
        return;
      }

      userLogin = {
        nama: selected.value,
        nip: selected.dataset.nip
      };

      saveSession(userLogin);
      masuk();
    }

    function loadUser() {
      const sessionUser = getSession();
      if (sessionUser) {
        userLogin = sessionUser;
        masuk();
      }
    }

    function updateJamAbsensiUser() {
      if (!userLogin) {
        jamMasukUser.innerText = "Jam masuk: 00.00";
        jamPulangUser.innerText = "Jam pulang: 00.00";
        return;
      }

      const data = jamAbsensiHariIni[userLogin.nama] || {
        masuk: "00:00",
        pulang: "00:00"
      };

      jamMasukUser.innerText = "Jam masuk: " + String(data.masuk || "00:00").replace(":", ".");
      jamPulangUser.innerText = "Jam pulang: " + String(data.pulang || "00:00").replace(":", ".");
    }

    function masuk() {
      loginBox.style.display = "none";
      absenBox.style.display = "block";
      namaUser.innerText = userLogin.nama;
      updateJamAbsensiUser();
      realtime();
      refreshSession();
    }

    function logout() {
      localStorage.removeItem("session_absen");
      location.reload();
    }

    function ambilFoto() {
      refreshSession();

      if (!video.srcObject) {
        alert("Kamera belum siap");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 400;
      canvas.height = video.videoHeight || 300;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      fotoBase64 = canvas.toDataURL("image/png");
      preview.src = fotoBase64;
      preview.style.display = "block";
      video.style.display = "none";
      submitInfo.innerText = "Foto berhasil diambil";
    }

    function ulangFoto() {
      refreshSession();
      fotoBase64 = null;
      preview.src = "";
      preview.style.display = "none";
      video.style.display = "block";
      submitInfo.innerText = "";
    }

    function updateFormPulang(statusSekarang) {
      if (statusSekarang === "PULANG") {
        formPulang.style.display = "block";
      } else {
        formPulang.style.display = "none";
        uraianTugas.value = "";
        outputKerja.value = "";
        alamatKerja.value = "";
      }
    }

    function getConfigTime(key, fallback) {
      const val = String(config[key] || "").trim();
      return /^\d{2}:\d{2}$/.test(val) ? val : fallback;
    }

    async function kirimAbsen() {
      try {
        refreshSession();

        if (!navigator.onLine) {
          alert("Perangkat sedang offline. Tidak bisa kirim absensi.");
          return;
        }

        if (!userLogin) {
          alert("Silakan login dulu");
          return;
        }

        if (!fotoBase64) {
          alert("Ambil foto dulu");
          return;
        }

        submitInfo.innerText = "Mengirim absen...";

        const jamSekarang = new Date().toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const status = statusText.innerText.includes("MASUK") ? "MASUK" : "PULANG";
        const jenis = jenisAbsen.value || "WFO";

        const nilaiUraian = uraianTugas.value.trim();
        const nilaiOutput = outputKerja.value.trim();
        const nilaiAlamat = alamatKerja.value.trim();

        if (status === "PULANG") {
          if (!nilaiUraian) {
            alert("Uraian tugas wajib diisi");
            return;
          }
          if (!nilaiOutput) {
            alert("Output wajib diisi");
            return;
          }
          if (!nilaiAlamat) {
            alert("Alamat wajib diisi");
            return;
          }
        }

        const form = new FormData();
        form.append("nama", userLogin.nama);
        form.append("nip", userLogin.nip);
        form.append("jenis", jenis);
        form.append("status", status);
        form.append("jam", jamSekarang);
        form.append("foto", fotoBase64);
        form.append("uraian_tugas", nilaiUraian);
        form.append("output", nilaiOutput);
        form.append("alamat", nilaiAlamat);

        const res = await fetch(API, {
          method: "POST",
          body: form,
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error("Gagal menghubungi server. HTTP " + res.status);
        }

        const text = await res.text();
        console.log("POST RESPONSE RAW:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response POST bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        console.log("DEBUG POST:", data.debug || {});
        submitInfo.innerText = "Absensi berhasil";

        alert(
          "Absensi berhasil\n\n" +
          JSON.stringify(data.debug || {}, null, 2)
        );

        location.reload();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal: " + err.message;
        alert("Gagal submit:\n" + err.message);
      }
    }

    function realtime() {
      if (realtimeStarted) return;
      realtimeStarted = true;

      setInterval(() => {
        const validSession = getSession();
        if (!validSession) {
          alert("Session login habis. Silakan login kembali.");
          logout();
          return;
        }

        const now = new Date();

        const jamLengkap = now.toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const jamShort = jamLengkap.substring(0, 5);
        jamText.innerText = jamLengkap.replace(/:/g, ".");

        const batasMasuk = getConfigTime("batas_masuk", "12:00");
        const statusSekarang = jamShort < batasMasuk ? "MASUK" : "PULANG";

        if (statusSekarang === "MASUK") {
          statusText.innerText = "🟢 MASUK";
          document.body.className = "masuk";
        } else {
          statusText.innerText = "🔴 PULANG";
          document.body.className = "pulang";
        }

        updateFormPulang(statusSekarang);
      }, 1000);
    }

    updateNetworkInfo();
    initApp();
  </script>
</body>
</html>
