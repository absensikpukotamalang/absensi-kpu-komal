<!DOCTYPE html>
<html>
<head>
  <title>Absensi</title>
  <style>
    body { font-family: Arial; text-align: center; }
    button { width:90%; padding:15px; font-size:20px; margin:10px; }
    video, img { width:90%; max-width:400px; }
    .masuk { background:green; color:white; }
    .pulang { background:red; color:white; }
    #terlambatText { font-size:28px; color:yellow; font-weight:bold; }
  </style>
</head>

<body>

<h2>ABSENSI</h2>

<div id="loginBox">
  <select id="loginNama"></select>
  <input type="password" id="pin" placeholder="PIN">
  <button onclick="login()">LOGIN</button>
</div>

<div id="absenBox" style="display:none;">
  <h3 id="namaUser"></h3>

  <h2 id="statusText"></h2>
  <h3 id="jamText"></h3>
  <h2 id="terlambatText"></h2>
  <h3 id="rekomendasiText"></h3>

  <video id="video" autoplay></video>
  <img id="preview" style="display:none;">

  <button onclick="ambilFoto()">📸 Ambil Foto</button>
  <button onclick="kirimAbsen()">✅ Kirim</button>
  <button onclick="ulangFoto()">🔄 Ulang</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycby3lXUibb38uEvbDmWqgsU8CrE8wabYDyvFrR0rKuJLYw6mSTULiq8LXga3hqP5rZBd/exec";

let pegawai=[],config={},userLogin=null,fotoBase64=null;

fetch(API).then(r=>r.json()).then(res=>{
  pegawai=res.pegawai; config=res.setting;
  pegawai.forEach(p=>{
    let o=document.createElement("option");
    o.value=p.nama; o.text=p.nama;
    o.dataset.nip=p.nip; o.dataset.pin=p.pin;
    loginNama.appendChild(o);
  });
  loadUser();
});

navigator.mediaDevices.getUserMedia({video:true})
.then(s=>video.srcObject=s);

function login(){
  let s=loginNama.selectedOptions[0];
  if(pin.value!==s.dataset.pin) return alert("PIN salah");
  userLogin={nama:s.value,nip:s.dataset.nip};
  localStorage.setItem("user",JSON.stringify(userLogin));
  masuk();
}

function loadUser(){
  let u=localStorage.getItem("user");
  if(u){userLogin=JSON.parse(u); masuk();}
}

function masuk(){
  loginBox.style.display="none";
  absenBox.style.display="block";
  namaUser.innerText=userLogin.nama;
  realtime();
}

function ambilFoto(){
  let c=document.createElement("canvas");
  c.width=video.videoWidth;
  c.height=video.videoHeight;
  c.getContext("2d").drawImage(video,0,0);
  fotoBase64=c.toDataURL("image/png");
  preview.src=fotoBase64;
  preview.style.display="block";
  video.style.display="none";
}

function ulangFoto(){
  preview.style.display="none";
  video.style.display="block";
  fotoBase64=null;
}

function kirimAbsen(){
  if(!fotoBase64) return alert("Ambil foto dulu");

  let jam=new Date().toTimeString().substring(0,5);
  let status=statusText.innerText.includes("MASUK")?"MASUK":"PULANG";

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      nama:userLogin.nama,
      nip:userLogin.nip,
      jenis:"WFO",
      status:status,
      jam:jam,
      foto:fotoBase64
    })
  })
  .then(r=>r.json())
  .then(r=>{
    if(r.result==="error") alert(r.message);
    else { alert("Berhasil"); location.reload(); }
  });
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function realtime(){
  setInterval(()=>{
    let now=new Date();
    let jam=now.toTimeString().substring(0,8);
    let jamShort=jam.substring(0,5);

    jamText.innerText=jam;

    let status=jamShort<config.batas_masuk?"MASUK":"PULANG";

    if(status==="MASUK"){
      statusText.innerText="🟢 MASUK";
      document.body.className="masuk";
    }else{
      statusText.innerText="🔴 PULANG";
      document.body.className="pulang";
    }

    hitungTerlambat(now);
  },1000);
}

function hitungTerlambat(now){
  let jamNow=now.toTimeString().substring(0,5);
  let jm=config.jam_masuk;

  if(jamNow>jm && jamNow<config.batas_masuk){
    let [h1,m1]=jamNow.split(":").map(Number);
    let [h2,m2]=jm.split(":").map(Number);
    let selisih=(h1*60+m1)-(h2*60+m2);

    terlambatText.innerText="TERLAMBAT "+selisih+" MENIT";

    let hari=now.getDay();
    let jp=(hari==5)?config.jam_pulang_jumat:config.jam_pulang_senin_kamis;

    let [h,m]=jp.split(":").map(Number);
    let total=h*60+m+selisih;

    let hh=String(Math.floor(total/60)).padStart(2,'0');
    let mm=String(total%60).padStart(2,'0');

    rekomendasiText.innerText="Pulang: "+hh+":"+mm;
  }else{
    terlambatText.innerText="";
    rekomendasiText.innerText="";
  }
}
</script>

</body>
</html>
