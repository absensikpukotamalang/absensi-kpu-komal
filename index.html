<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absensi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      transition: background 0.3s ease;
    }

    body.masuk {
      background: #198754;
      color: white;
    }

    body.pulang {
      background: #dc3545;
      color: white;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    h1, h2, h3, p {
      margin: 8px 0;
    }

    .field {
      margin: 10px 0;
      text-align: left;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 16px;
    }

    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      font-size: 17px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    input[readonly] {
      background: #f1f1f1;
      color: #333;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    video, img {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      background: #000;
      margin-top: 10px;
    }

    .info {
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
    }

    .small {
      font-size: 14px;
      opacity: 0.98;
      margin-top: 4px;
    }

    .warning {
      font-size: 15px;
      font-weight: bold;
      margin-top: 8px;
    }

    #networkInfo, #jamText {
      font-weight: bold;
    }

    #statusBox {
      margin: 16px 0;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
    }

    #warningTerlambat {
      color: #fff3cd;
    }

    #rekomendasiPulang {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="judulAbsen">ABSEN MASUK</h1>
    <div id="networkInfo"></div>

    <div id="statusBox">
      <h2 id="statusText">🟢 MASUK</h2>
      <div id="jamText">00.00.00</div>
      <div class="small" id="infoBatas"></div>
      <div class="warning" id="warningTerlambat"></div>
      <div class="small" id="rekomendasiPulang"></div>
    </div>

    <div class="field">
      <label for="nama">NAMA</label>
      <select id="nama">
        <option value="">-- Pilih Nama --</option>
      </select>
    </div>

    <div class="field">
      <label for="nip">NIP</label>
      <input type="text" id="nip" readonly />
    </div>

    <div class="field">
      <label for="jenisAbsen">JENIS ABSEN</label>
      <select id="jenisAbsen">
        <option value="WFO" selected>WFO</option>
        <option value="WFA">WFA</option>
        <option value="WFH">WFH</option>
        <option value="CUTI">CUTI</option>
        <option value="DL">DL</option>
        <option value="SAKIT">SAKIT</option>
        <option value="IJIN">IJIN</option>
      </select>
    </div>

    <div id="formPulang" style="display:none;">
      <div class="field">
        <label for="jabatan">JABATAN</label>
        <input type="text" id="jabatan" readonly />
      </div>

      <div class="field">
        <label for="atasan">ATASAN</label>
        <input type="text" id="atasan" readonly />
      </div>

      <div class="field">
        <label for="uraianTugas">URAIAN TUGAS</label>
        <textarea id="uraianTugas" placeholder="Isi uraian tugas"></textarea>
      </div>

      <div class="field">
        <label for="outputKerja">OUTPUT</label>
        <textarea id="outputKerja" placeholder="Isi output pekerjaan"></textarea>
      </div>

      <div class="field">
        <label for="alamat">ALAMAT</label>
        <textarea id="alamat" placeholder="Isi alamat"></textarea>
      </div>
    </div>

    <h3>AMBIL SELFIE</h3>
    <video id="video" autoplay playsinline></video>
    <img id="preview" alt="Preview Foto" style="display:none;" />

    <div class="btn-row">
      <button type="button" onclick="ambilFoto()">AMBIL FOTO</button>
      <button type="button" onclick="ulangFoto()">ULANG</button>
      <button type="button" onclick="kirimAbsen()">KIRIM</button>
    </div>

    <div class="info" id="submitInfo"></div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxl0fJC2790vwN9DYnr6xCXW_BBuMAIP0M7btnF4SIpwzAw4dV1hTMDP1f6k652sp4/exec";
    const SESSION_MS = 5 * 60 * 1000;

    let pegawai = [];
    let config = {};
    let fotoBase64 = null;
    let sessionTimer = null;

    const nama = document.getElementById("nama");
    const nip = document.getElementById("nip");
    const jabatan = document.getElementById("jabatan");
    const atasan = document.getElementById("atasan");
    const jenisAbsen = document.getElementById("jenisAbsen");
    const uraianTugas = document.getElementById("uraianTugas");
    const outputKerja = document.getElementById("outputKerja");
    const alamat = document.getElementById("alamat");
    const formPulang = document.getElementById("formPulang");
    const judulAbsen = document.getElementById("judulAbsen");
    const statusText = document.getElementById("statusText");
    const jamText = document.getElementById("jamText");
    const infoBatas = document.getElementById("infoBatas");
    const warningTerlambat = document.getElementById("warningTerlambat");
    const rekomendasiPulang = document.getElementById("rekomendasiPulang");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");
    const submitInfo = document.getElementById("submitInfo");
    const networkInfo = document.getElementById("networkInfo");

    function updateNetworkInfo() {
      networkInfo.innerText = navigator.onLine ? "Online" : "Offline";
    }

    window.addEventListener("online", updateNetworkInfo);
    window.addEventListener("offline", updateNetworkInfo);

    function getConfigTime(key, fallback) {
      const val = String(config[key] || "").trim();
      return /^\d{2}:\d{2}$/.test(val) ? val : fallback;
    }

    function timeToMinutes(hhmm) {
      const parts = String(hhmm || "00:00").split(":");
      const h = Number(parts[0] || 0);
      const m = Number(parts[1] || 0);
      return (h * 60) + m;
    }

    function minutesToTime(totalMinutes) {
      let h = Math.floor(totalMinutes / 60);
      let m = totalMinutes % 60;

      h = ((h % 24) + 24) % 24;

      return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
    }

    function getHariJakarta() {
      return new Intl.DateTimeFormat("id-ID", {
        weekday: "long",
        timeZone: "Asia/Jakarta"
      }).format(new Date()).toLowerCase();
    }

    function getJamPulangResmi() {
      const hari = getHariJakarta();

      if (hari === "senin" || hari === "selasa" || hari === "rabu" || hari === "kamis") {
        return getConfigTime("jam_pulang_senin_kamis", "16:00");
      }

      if (hari === "jumat") {
        return getConfigTime("jam_pulang_jumat", "16:30");
      }

      return getConfigTime("jam_pulang_senin_kamis", "16:00");
    }

    function getStatusSekarang() {
      const now = new Date();
      const jamShort = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const batasGantiForm = getConfigTime("batas_ganti_form", "12:00");
      return jamShort < batasGantiForm ? "MASUK" : "PULANG";
    }

    function clearFormPulang() {
      uraianTugas.value = "";
      outputKerja.value = "";
      alamat.value = "";
    }

    function isiDataPegawai() {
      const selectedNama = nama.value;
      const p = pegawai.find(x => x.nama === selectedNama);

      if (!p) {
        nip.value = "";
        jabatan.value = "";
        atasan.value = "";
        return;
      }

      nip.value = p.nip || "";
      jabatan.value = p.jabatan || "";
      atasan.value = p.atasan || "";
      resetSessionTimer();
    }

    function updateWarningTerlambat() {
      const status = getStatusSekarang();

      if (status !== "MASUK") {
        warningTerlambat.innerText = "";
        rekomendasiPulang.innerText = "";
        return;
      }

      const now = new Date();
      const jamSekarang = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const batasMasuk = getConfigTime("batas_masuk", "07:30");
      const jamPulangResmi = getJamPulangResmi();

      const menitSekarang = timeToMinutes(jamSekarang);
      const menitBatasMasuk = timeToMinutes(batasMasuk);
      const menitPulangResmi = timeToMinutes(jamPulangResmi);

      const terlambat = menitSekarang - menitBatasMasuk;

      if (terlambat <= 0) {
        warningTerlambat.innerText = "Tidak terlambat";
        rekomendasiPulang.innerText = "Jam pulang hari ini: " + jamPulangResmi.replace(":", ".");
        return;
      }

      if (terlambat > 59) {
        warningTerlambat.innerText = "WARNING : ANDA MELEBIHI BATAS WAKTU KETERLAMBATAN.";
        rekomendasiPulang.innerText = "";
        return;
      }

      const rekomendasi = minutesToTime(menitPulangResmi + terlambat);
      warningTerlambat.innerText = "Warning: Terlambat " + terlambat + " menit";
      rekomendasiPulang.innerText = "Rekomendasi pulang: " + rekomendasi.replace(":", ".");
    }

    function updateTampilanStatus() {
      const now = new Date();
      const jamLengkap = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const status = getStatusSekarang();
      const batasMasuk = getConfigTime("batas_masuk", "07:30");
      const batasGantiForm = getConfigTime("batas_ganti_form", "12:00");

      jamText.innerText = jamLengkap.replace(/:/g, ".");
      infoBatas.innerText =
        "Batas masuk: " + batasMasuk.replace(":", ".") +
        " | Ganti form: " + batasGantiForm.replace(":", ".");

      if (status === "MASUK") {
        judulAbsen.innerText = "ABSEN MASUK";
        statusText.innerText = "🟢 MASUK";
        document.body.className = "masuk";
        formPulang.style.display = "none";
        clearFormPulang();
      } else {
        judulAbsen.innerText = "ABSEN PULANG";
        statusText.innerText = "🔴 PULANG";
        document.body.className = "pulang";
        formPulang.style.display = "block";
      }

      updateWarningTerlambat();
    }

    async function initApp() {
      try {
        updateNetworkInfo();
        submitInfo.innerText = "Memuat data pegawai...";

        const res = await fetch(API, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        pegawai = data.pegawai || [];
        config = data.setting || {};

        nama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        pegawai.forEach(p => {
          const o = document.createElement("option");
          o.value = p.nama;
          o.textContent = p.nama;
          nama.appendChild(o);
        });

        submitInfo.innerText = "";
        updateTampilanStatus();
        startRealtime();
        startCamera();
        initSessionAutoRefresh();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal memuat data: " + err.message;
        alert("Gagal memuat data:\n" + err.message);
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        alert("Kamera tidak bisa diakses: " + err.message);
      }
    }

    function ambilFoto() {
      resetSessionTimer();

      if (!video.srcObject) {
        alert("Kamera belum siap");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 400;
      canvas.height = video.videoHeight || 300;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      fotoBase64 = canvas.toDataURL("image/png");
      preview.src = fotoBase64;
      preview.style.display = "block";
      video.style.display = "none";
      submitInfo.innerText = "Foto berhasil diambil";
    }

    function ulangFoto() {
      resetSessionTimer();
      fotoBase64 = null;
      preview.src = "";
      preview.style.display = "none";
      video.style.display = "block";
      submitInfo.innerText = "";
    }

    function initSessionAutoRefresh() {
      resetSessionTimer();

      ["click", "change", "input", "keydown", "touchstart"].forEach(evt => {
        document.addEventListener(evt, resetSessionTimer, { passive: true });
      });
    }

    function resetSessionTimer() {
      clearTimeout(sessionTimer);
      sessionTimer = setTimeout(() => {
        alert("Session habis karena tidak submit dalam 5 menit. Halaman akan di-refresh.");
        location.reload();
      }, SESSION_MS);
    }

    function startRealtime() {
      updateTampilanStatus();
      setInterval(updateTampilanStatus, 1000);
    }

    async function kirimAbsen() {
      try {
        resetSessionTimer();

        if (!navigator.onLine) {
          alert("Perangkat sedang offline");
          return;
        }

        if (!nama.value) {
          alert("Pilih nama terlebih dahulu");
          return;
        }

        if (!nip.value) {
          alert("NIP belum terisi");
          return;
        }

        if (!fotoBase64) {
          alert("Ambil foto dulu");
          return;
        }

        const status = getStatusSekarang();

        if (status === "PULANG") {
          if (!jabatan.value.trim()) {
            alert("Jabatan kosong");
            return;
          }
          if (!atasan.value.trim()) {
            alert("Atasan kosong");
            return;
          }
          if (!uraianTugas.value.trim()) {
            alert("Uraian tugas wajib diisi");
            return;
          }
          if (!outputKerja.value.trim()) {
            alert("Output wajib diisi");
            return;
          }
          if (!alamat.value.trim()) {
            alert("Alamat wajib diisi");
            return;
          }
        }

        submitInfo.innerText = "Mengirim absensi...";

        const jamSekarang = new Date().toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const form = new FormData();
        form.append("nama", nama.value);
        form.append("nip", nip.value);
        form.append("jenis", jenisAbsen.value || "WFO");
        form.append("status", status);
        form.append("jam", jamSekarang);
        form.append("foto", fotoBase64);
        form.append("jabatan", jabatan.value || "");
        form.append("atasan", atasan.value || "");
        form.append("uraian_tugas", uraianTugas.value.trim());
        form.append("output", outputKerja.value.trim());
        form.append("alamat", alamat.value.trim());

        const res = await fetch(API, {
          method: "POST",
          body: form,
          cache: "no-store"
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response POST bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        submitInfo.innerText = "Absensi berhasil";
        alert("Absensi berhasil");
        location.reload();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal: " + err.message;
        alert("Gagal submit:\n" + err.message);
      }
    }

    nama.addEventListener("change", isiDataPegawai);

    updateNetworkInfo();
    initApp();
  </script>
</body>
</html>
