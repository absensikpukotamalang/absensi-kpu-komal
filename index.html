<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      transition: background 0.3s ease;
    }

    body.masuk {
      background: #198754;
      color: white;
    }

    body.pulang {
      background: #dc3545;
      color: white;
    }

    #loginBox, #absenBox {
      max-width: 500px;
      margin: 0 auto;
    }

    select, input, button {
      width: 90%;
      max-width: 400px;
      padding: 15px;
      font-size: 18px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    input, select {
      border: 1px solid #ccc;
      color: black;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    video, img {
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 10px;
      background: #000;
    }

    #statusText {
      font-size: 32px;
      margin-bottom: 5px;
    }

    #jamText {
      font-size: 24px;
      margin-top: 0;
    }

    #terlambatText {
      font-size: 28px;
      color: yellow;
      font-weight: bold;
      margin: 10px 0;
    }

    #rekomendasiText {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .info {
      font-size: 16px;
      margin-top: 8px;
      opacity: 0.95;
    }
  </style>
</head>
<body>

  <h2>ABSENSI</h2>

  <div id="loginBox">
    <select id="loginNama">
      <option value="">-- Pilih Nama --</option>
    </select>
    <input type="password" id="pin" placeholder="PIN">
    <button onclick="login()">LOGIN</button>
    <div class="info" id="loginInfo"></div>
  </div>

  <div id="absenBox" style="display:none;">
    <h3 id="namaUser"></h3>
    <h2 id="statusText"></h2>
    <h3 id="jamText"></h3>
    <h2 id="terlambatText"></h2>
    <h3 id="rekomendasiText"></h3>

    <video id="video" autoplay playsinline></video>
    <img id="preview" style="display:none;" alt="Preview Foto">

    <br>
    <button onclick="ambilFoto()">📸 Ambil Foto</button>
    <button onclick="kirimAbsen()">✅ Kirim</button>
    <button onclick="ulangFoto()">🔄 Ulang</button>
    <button onclick="logout()">Logout</button>

    <div class="info" id="submitInfo"></div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxl0fJC2790vwN9DYnr6xCXW_BBuMAIP0M7btnF4SIpwzAw4dV1hTMDP1f6k652sp4/exec";

    let pegawai = [];
    let config = {};
    let userLogin = null;
    let fotoBase64 = null;
    let realtimeStarted = false;

    const loginNama = document.getElementById("loginNama");
    const pin = document.getElementById("pin");
    const loginBox = document.getElementById("loginBox");
    const absenBox = document.getElementById("absenBox");
    const namaUser = document.getElementById("namaUser");
    const statusText = document.getElementById("statusText");
    const jamText = document.getElementById("jamText");
    const terlambatText = document.getElementById("terlambatText");
    const rekomendasiText = document.getElementById("rekomendasiText");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");
    const loginInfo = document.getElementById("loginInfo");
    const submitInfo = document.getElementById("submitInfo");

    async function initApp() {
      try {
        loginInfo.innerText = "Memuat data pegawai...";
        const res = await fetch(API);
        const data = await res.json();

        if (data.result === "error") {
          throw new Error(data.message);
        }

        pegawai = data.pegawai || [];
        config = data.setting || {};

        pegawai.forEach(p => {
          const o = document.createElement("option");
          o.value = p.nama;
          o.textContent = p.nama;
          o.dataset.nip = p.nip;
          o.dataset.pin = p.pin;
          loginNama.appendChild(o);
        });

        loginInfo.innerText = "";
        loadUser();
        startCamera();

      } catch (err) {
        console.error(err);
        loginInfo.innerText = "Gagal memuat data: " + err.message;
        alert("Gagal memuat data: " + err.message);
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        alert("Kamera tidak bisa diakses: " + err.message);
      }
    }

    function login() {
      const selected = loginNama.selectedOptions[0];

      if (!selected || !selected.value) {
        alert("Pilih nama terlebih dahulu");
        return;
      }

      if (pin.value !== selected.dataset.pin) {
        alert("PIN salah");
        return;
      }

      userLogin = {
        nama: selected.value,
        nip: selected.dataset.nip
      };

      localStorage.setItem("user", JSON.stringify(userLogin));
      masuk();
    }

    function loadUser() {
      const u = localStorage.getItem("user");
      if (u) {
        userLogin = JSON.parse(u);
        masuk();
      }
    }

    function masuk() {
      loginBox.style.display = "none";
      absenBox.style.display = "block";
      namaUser.innerText = userLogin.nama;
      realtime();
    }

    function logout() {
      localStorage.removeItem("user");
      location.reload();
    }

    function ambilFoto() {
      if (!video.srcObject) {
        alert("Kamera belum siap");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 400;
      canvas.height = video.videoHeight || 300;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      fotoBase64 = canvas.toDataURL("image/png");
      preview.src = fotoBase64;
      preview.style.display = "block";
      video.style.display = "none";
      submitInfo.innerText = "Foto berhasil diambil";
    }

    function ulangFoto() {
      fotoBase64 = null;
      preview.src = "";
      preview.style.display = "none";
      video.style.display = "block";
      submitInfo.innerText = "";
    }

    async function kirimAbsen() {
      try {
        if (!userLogin) {
          alert("Silakan login dulu");
          return;
        }

        if (!fotoBase64) {
          alert("Ambil foto dulu");
          return;
        }

        submitInfo.innerText = "Mengirim absen...";

        const jamSekarang = new Date().toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const status = statusText.innerText.includes("MASUK") ? "MASUK" : "PULANG";

        const form = new FormData();
        form.append("nama", userLogin.nama);
        form.append("nip", userLogin.nip);
        form.append("jenis", "WFO");
        form.append("status", status);
        form.append("jam", jamSekarang);
        form.append("foto", fotoBase64);

        const res = await fetch(API, {
          method: "POST",
          body: form
        });

        const data = await res.json();

        if (data.result === "error") {
          throw new Error(data.message);
        }

        submitInfo.innerText = "Absensi berhasil";
        alert("Absensi berhasil");
        location.reload();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal: " + err.message;
        alert("Gagal submit: " + err.message);
      }
    }

    function realtime() {
      if (realtimeStarted) return;
      realtimeStarted = true;

      setInterval(() => {
        const now = new Date();

        const jamLengkap = now.toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const jamShort = jamLengkap.substring(0, 5);
        jamText.innerText = jamLengkap;

        const batasMasuk = config.batas_masuk || "08:00";
        const jamMasuk = config.jam_masuk || "07:30";

        const statusSekarang = jamShort < batasMasuk ? "MASUK" : "PULANG";

        if (statusSekarang === "MASUK") {
          statusText.innerText = "🟢 MASUK";
          document.body.className = "masuk";
        } else {
          statusText.innerText = "🔴 PULANG";
          document.body.className = "pulang";
        }

        // terlambat
        if (jamShort > jamMasuk && jamShort < batasMasuk) {
          const [h1, m1] = jamShort.split(":").map(Number);
          const [h2, m2] = jamMasuk.split(":").map(Number);
          const selisih = (h1 * 60 + m1) - (h2 * 60 + m2);

          terlambatText.innerText = "TERLAMBAT " + selisih + " MENIT";

          const hari = now.getDay();
          const jamPulang = hari === 5
            ? (config.jam_pulang_jumat || "16:30")
            : (config.jam_pulang_senin_kamis || "16:00");

          const [hp, mp] = jamPulang.split(":").map(Number);
          const total = (hp * 60 + mp) + selisih;
          const hh = String(Math.floor(total / 60)).padStart(2, "0");
          const mm = String(total % 60).padStart(2, "0");

          rekomendasiText.innerText = "Pulang: " + hh + ":" + mm;
        } else {
          terlambatText.innerText = "";
          rekomendasiText.innerText = "";
        }

      }, 1000);
    }

    initApp();
  </script>
</body>
</html>
